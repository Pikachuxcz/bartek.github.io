<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Bootstrap Assignment</title>

  <!-- Bootstrap CSS -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  >
</head>

<body>

  <div class="container mt-5">

    <h1 class="text-center mb-5">
      My Bootstrap Grid Page
    </h1>

    <!-- First Row -->
    <div class="row text-center">

      <div class="col-md-4 bg-primary text-white p-4">
        Column 1
      </div>

      <div class="col-md-4 bg-success text-white p-4">
        Column 2
      </div>

      <div class="col-md-4 bg-danger text-white p-4">
        Column 3
      </div>

    </div>

    <!-- Second Row -->
    <div class="row text-center mt-4">

      <div class="col-md-6 bg-warning p-4">
        Left Side
      </div>

      <div class="col-md-6 bg-dark text-white p-4">
        Right Side
      </div>

    </div>

  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
